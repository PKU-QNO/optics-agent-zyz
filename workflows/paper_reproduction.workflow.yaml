# ============================================================================
# 论文复现标准工作流 (Paper Reproduction Workflow) v0.1.0
# ============================================================================
# 此文件是 optics_agent 论文复现任务的拓扑结构定义。
# Agent 启动时载入此文件，按节点顺序执行，分支节点根据条件动态路由。
# 每个节点执行完毕后，Agent 更新工作流状态文件 (workflow_state.yaml)。
# ============================================================================

name: paper_reproduction
version: 0.1.0
description: >
  论文复现标准工作流。从论文阅读到参数提取、理论推导、数值实现、结果验证、
  报告生成的全流程自动化。包含失败回退、分支检查、蓝图和 SKILL 自迭代。
author: optics_agent
last_updated: 2026-06-18
iteration_count: 0

# ==== 节点定义 ================================================================

nodes:

  # ---- 第一步：论文阅读与参数提取 ----
  paper_reading:
    type: prompt
    description: 阅读论文 PDF，提取物理模型、几何参数、材料参数、数值方法
    instruction: |
      目标：阅读指定论文，系统提取复现所需全部信息。

      必须提取的内容：
      1. 论文元数据：标题、作者、DOI、期刊
      2. 物理模型：控制方程、边界条件、初始条件
      3. 几何结构：维度（1D/2D/3D）、尺寸参数、对称性
      4. 材料参数：折射率、介电常数、磁导率、色散模型
      5. 数值方法：FEM参数、网格类型、求解器类型、频率范围
      6. 目标输出：图的编号、坐标轴含义、预期物理现象
      7. 所用软件/版本（如注明）

      输出文件：
      - reproduction/private/<case_name>/params.yaml
      - reproduction/private/<case_name>/paper_notes.md

      格式约定：
      - params.yaml 使用标准格式（见 schemas/params_schema.yaml）
      - paper_notes.md 使用 Markdown，包含公式、图表说明
    produces:
      - reproduction/private/<case_name>/params.yaml
      - reproduction/private/<case_name>/paper_notes.md
    next: theory_derivation

  # ---- 第二步：理论推导与分析 ----
  theory_derivation:
    type: prompt
    description: 基于论文参数进行理论推导，建立物理理解
    instruction: |
      目标：基于论文参数，推导理论模型，建立数值实现的物理基础。

      必须完成：
      1. 写出控制方程（Maxwell方程/波动方程/本构关系）
      2. 确定边界条件（PML/周期性/完美导体等）
      3. 明确简化和假设（如：TM模式、弱引导近似等）
      4. 推导预期物理行为（共振条件、色散关系、耦合条件）
      5. 识别关键数值参数（波长、网格分辨率要求）

      输出文件：
      - reproduction/private/<case_name>/theory_derivation.md

      检查清单：
      - 方程量纲一致？
      - 边界条件与物理场景匹配？
      - 预期行为符合物理直觉？
    produces:
      - reproduction/private/<case_name>/theory_derivation.md
    next: theory_check

  # ---- 第三步：理论检查（分支点） ----
  theory_check:
    type: branch
    description: 检查理论推导的正确性和完备性
    instruction: |
      评估理论推导的质量，输出 pass 或 fail。

      评估标准：
      - 方程是否与论文一致？
      - 量纲是否正确？
      - 边界条件是否合理？
      - 简化假设是否在有效范围内？
      - 预期物理行为是否合理？

      请基于以上标准，做出判断并附上简要理由。
    condition: 理论推导质量控制
    branches:
      pass: numerical_program        # 通过 → 进入数值实现
      fail: theory_derivation        # 不通过 → 返回理论推导
    max_retries: 3

  # ---- 第四步：数值程序生成 ----
  numerical_program:
    type: prompt
    description: 生成 COMSOL Java 代码（或调用蓝图），实现数值仿真
    instruction: |
      目标：基于理论推导和参数，生成数值仿真程序。

      优先使用蓝图工作流：
      1. 检查 .magnus/.blueprints/ 中是否有匹配的蓝图
      2. 如有，调用蓝图生成 Java 代码框架
      3. 如无，参考 comsol-java-api skill 手动编写 Java

      必须完成：
      1. 几何构建（参数化）
      2. 材料定义（从 params.yaml 读取）
      3. 物理场设置（Wave Optics / RF Module）
      4. 网格设置（基于波长分辨率要求）
      5. 研究设置（特征频率/频域扫描/参数扫描）
      6. 结果导出设置（neff, 场分布等）

      工具调用：
      - 使用 comsol-java-api skill 获取 Java API 语法
      - 使用 optics-comsol-batch skill 设置批处理参数
      - 使用 optics-magnus-platform skill 配置 Magnus 提交
      - 检查 LICENSE 挂载路径

      输出文件：
      - reproduction/private/<case_name>/model.java
      - reproduction/private/<case_name>/magnus_job.yaml

      输出检查：
      - Java 代码无 inner class / anonymous class
      - Model run() 方法返回 Model
      - Magnus job 资源设置合规
    produces:
      - reproduction/private/<case_name>/model.java
      - reproduction/private/<case_name>/magnus_job.yaml
    next: magnus_submit

  # ---- 第五步：Magnus 作业提交 ----
  magnus_submit:
    type: prompt
    description: 通过 Magnus 提交 COMSOL 作业
    instruction: |
      目标：提交 COMSOL 批处理作业到 Magnus 集群。

      步骤：
      1. 检查集群资源（cpu/gpu 使用率）
      2. 确认 LICENSE 挂载路径
      3. 提交作业
      4. 记录 job_id
      5. 监控作业状态（每 60 秒检查一次）

      工具调用：
      - 使用 optics-magnus-platform skill 的作业生命周期函数
      - 使用 optics-comsol-runtime skill 验证许可证挂载

      输出文件：
      - reproduction/private/<case_name>/magnus_job_state.yaml
        （包含：job_id, status, start_time, log_path）
    produces:
      - reproduction/private/<case_name>/magnus_job_state.yaml
    next: numerical_check

  # ---- 第六步：数值结果检查（分支点） ----
  numerical_check:
    type: branch
    description: 检查数值仿真结果的质量和正确性
    instruction: |
      评估数值仿真结果，输出 pass/fail。

      评估标准：
      - 仿真是否成功完成（无报错）？
      - 结果是否有物理意义（非 NaN/Inf）？
      - neff 值是否在预期范围内？
      - 网格收敛性是否合理？
      - 是否出现物理现象（如 anticrossing）？

      输出 pass/fail + 详细失败原因。

      失败原因分类：
      - mesh_error: 网格问题
      - solver_error: 求解器不收敛
      - matrix_error: 矩阵分解失败
      - unphysical: 结果无物理意义
      - license_error: 许可证问题
    condition: 数值结果质量控制
    branches:
      pass: answer_verification        # 通过 → 进入答案核对
      fail: numerical_debug            # 不通过 → 进入调试
    max_retries: 5

  # ---- 第六步B：数值调试（失败回退分支） ----
  numerical_debug:
    type: prompt
    description: 调试数值仿真问题
    instruction: |
      目标：根据 numerical_check 的失败原因进行针对性调试。

      调试策略（按失败原因分类）：
      - mesh_error: 调整网格尺寸、使用自适应网格
      - solver_error: 修改求解器设置、增加迭代次数、调整弛豫因子
      - matrix_error: 更换特征值移位（shift）、修改搜索范围
      - unphysical: 检查材料参数、边界条件、激励设置
      - license_error: 检查许可证挂载路径、联系管理员

      每次调试后记录：
      - 修改了什么
      - 为什么修改
      - 预期效果

      如多次尝试无效（超过 max_retries），调用人工介入协议：
      - 记录完整调试日志
      - 生成 handoff 报告
      - 请求 COMSOL GUI 导出的 Java 模板
    produces:
      - reproduction/private/<case_name>/debug_log.md
    next: magnus_submit                 # 返回重新提交

  # ---- 第七步：答案核对 ----
  answer_verification:
    type: prompt
    description: 将数值结果与论文原始结果进行对比验证
    instruction: |
      目标：将计算结果与论文中的图/表进行定量对比。

      必须完成：
      1. 从仿真结果提取目标数据（如 neff vs 波长曲线）
      2. 从论文提取参考数据（digitize 曲线或读表）
      3. 计算误差指标（绝对误差、相对误差、RMSE）
      4. 判断复现是否成功

      复现成功标准：
      - 物理成功：关键物理现象再现（如 anticrossing 位置）
      - 定量成功：数值偏差在论文精度范围内
      - 定性成功：趋势一致，偏差可解释

      输出文件：
      - reproduction/private/<case_name>/comparison.yaml
    produces:
      - reproduction/private/<case_name>/comparison.yaml
    next: generate_report

  # ---- 第八步：生成报告 ----
  generate_report:
    type: prompt
    description: 生成复现报告
    instruction: |
      目标：生成完整的复现报告。

      报告结构：
      1. 论文信息
      2. 复现参数
      3. 理论推导摘要
      4. 数值方法
      5. 结果对比（图/表）
      6. 复现结论（pipeline / COMSOL / physical 三种状态）
      7. 问题和改进建议

      输出文件：
      - reproduction/private/<case_name>/final_report.md

      状态约定（必须明确标注）：
      - pipeline completed: 工作流执行完成
      - COMSOL job completed: 仿真作业完成
      - physical reproduction completed: 物理现象复现
    produces:
      - reproduction/private/<case_name>/final_report.md
    next: update_artifacts

  # ---- 第九步：更新蓝图、SKILL、工作流 ----
  update_artifacts:
    type: prompt
    description: 基于本次复现的经验，更新蓝图、SKILL 文件和工作流定义
    instruction: |
      目标：从本次复现中提取可复用的经验，更新项目工件。

      需要更新的工件：
      1. 蓝图更新：
         - 如成功：更新 .magnus/.blueprints/ 中的参数默认值
         - 如失败：记录失败模式到蓝图注释
      2. SKILL 更新：
         - 提取新的 COMSOL Java API 用法 → 更新 comsol-java-api skill
         - 提取新的 Magnus 配置 → 更新 optics-magnus-platform skill
         - 提取新的失败模式 → 更新 optics-paper-reproduction skill
         - 将 lessons learned 追加到 SKILL.md 的 Lessons 部分
      3. 工作流自迭代：
         - 评估当前工作流拓扑是否最优
         - 如发现更好的节点顺序/分支条件
         - 更新 paper_reproduction.workflow.yaml 本身
         - 递增 version 号
         - 更新 iteration_count
         - 追加 history 条目

      输出文件：
      - 更新的 SKILL.md 文件
      - 更新的 .workflow.yaml 文件
      - 更新的蓝图文件
    produces:
      - updated_skills: 更新后的 SKILL 文件列表
      - updated_workflow: paper_reproduction.workflow.yaml
    next: check_iteration

  # ---- 第十步：检查迭代质量（分支点） ----
  check_iteration:
    type: branch
    description: 评估工件更新的质量，决定是否进入下一轮迭代
    instruction: |
      评估工件更新质量，输出 pass/fail。

      评估标准：
      pass — 更新有效，经验已固化，迭代结束
        - SKILL 更新无格式错误
        - 蓝图更新已验证
        - 工作流拓扑改进合理
      
      fail — 更新质量不足，需要再次迭代
        - SKILL 更新缺少关键内容
        - 蓝图变更未测试
        - 工作流拓扑修改有逻辑缺陷

      注意：此分支主要检查 self-iteration 的质量
    condition: 迭代质量评估
    branches:
      pass: end                          # 通过 → 工作流结束
      fail: paper_reading                # 不通过 → 从头迭代
    max_retries: 2

  # ---- 终止节点 ----
  end:
    type: prompt
    description: 工作流完成
    instruction: |
      工作流执行完毕。确认以下文件已生成：
      1. reproduction/private/<case_name>/final_report.md
      2. 更新的 SKILL 文件（如有）
      3. 更新的工作流定义（如有）

      输出最终状态摘要。
